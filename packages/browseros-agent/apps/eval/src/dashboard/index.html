<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eval Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; height: 100vh; display: flex; flex-direction: column; }

  /* Top bar */
  .topbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .topbar h1 { font-size: 15px; font-weight: 600; color: #58a6ff; }
  .topbar .config { font-size: 13px; color: #8b949e; }
  .topbar .progress { margin-left: auto; font-size: 13px; font-weight: 600; color: #e1e4e8; }
  .topbar .progress .pass { color: #3fb950; }
  .topbar .progress .fail { color: #f85149; }

  /* Config panel */
  .config-panel { background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0; }
  .config-header { padding: 8px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
  .config-header:hover { background: #1c2128; }
  .config-header span:first-child { font-size: 13px; font-weight: 600; color: #8b949e; }
  .config-summary { font-size: 12px; color: #58a6ff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .config-toggle { background: none; border: none; color: #8b949e; font-size: 12px; cursor: pointer; transition: transform 0.2s; }
  .config-toggle.open { transform: rotate(180deg); }
  .config-body { display: none; padding: 12px 20px 16px; }
  .config-body.open { display: block; }

  /* Form layout */
  .config-form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .config-section { display: flex; flex-direction: column; gap: 8px; }
  .config-section h3 { font-size: 12px; font-weight: 600; color: #58a6ff; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .config-row { display: flex; gap: 8px; }
  .config-field { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .config-field label { font-size: 11px; color: #8b949e; }
  .config-field input, .config-field select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 8px; border-radius: 4px; font-size: 12px; font-family: inherit; }
  .config-field input:focus, .config-field select:focus { outline: none; border-color: #58a6ff; }
  .config-field input::placeholder { color: #484f58; }
  .config-field select { cursor: pointer; }
  .config-field-inline { display: flex; align-items: center; gap: 6px; }
  .config-field-inline input[type="checkbox"] { width: 14px; height: 14px; accent-color: #58a6ff; }
  .config-field-inline label { font-size: 11px; color: #8b949e; }
  .config-field label .req { color: #f0883e; font-weight: 600; }

  /* Dynamic agent fields */
  .agent-fields { display: none; }
  .agent-fields.active { display: flex; flex-direction: column; gap: 8px; }
  .agent-sub-section { margin-top: 4px; }
  .agent-sub-section h4 { font-size: 11px; font-weight: 600; color: #bc8cff; margin-bottom: 4px; }

  /* Actions bar */
  .config-actions { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; margin-top: 4px; padding-top: 12px; border-top: 1px solid #21262d; }
  .config-actions .load-config { display: flex; align-items: center; gap: 6px; }
  .config-actions .load-config label { font-size: 11px; color: #8b949e; }
  .btn-run { background: #238636; color: #fff; border: none; padding: 6px 20px; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; margin-left: auto; }
  .btn-run:hover { background: #2ea043; }
  .btn-run:disabled { background: #21262d; color: #484f58; cursor: default; }
  .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 6px 14px; border-radius: 4px; font-size: 13px; cursor: pointer; }
  .btn-secondary:hover { background: #30363d; }
  .config-error { color: #f85149; font-size: 12px; flex: 1; text-align: center; }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Left sidebar - task list */
  .sidebar { width: 280px; border-right: 1px solid #30363d; overflow-y: auto; flex-shrink: 0; background: #0d1117; }
  .task-item { padding: 10px 14px; border-bottom: 1px solid #21262d; cursor: pointer; transition: background 0.15s; }
  .task-item:hover { background: #161b22; }
  .task-item.active { background: #1c2333; border-left: 3px solid #58a6ff; }
  .task-item.running { border-left: 3px solid #d29922; }
  .task-item .task-id { font-size: 13px; font-weight: 600; color: #e1e4e8; display: flex; align-items: center; gap: 6px; }
  .task-item .task-query { font-size: 11px; color: #8b949e; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-item .task-meta { font-size: 11px; color: #6e7681; margin-top: 3px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .status-dot.pending { background: #484f58; }
  .status-dot.running { background: #d29922; animation: pulse 1.5s infinite; }
  .status-dot.completed { background: #3fb950; }
  .status-dot.failed { background: #f85149; }
  .status-dot.timeout { background: #f0883e; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .grade-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; margin-left: auto; }
  .grade-badge.pass { background: #238636; color: #fff; }
  .grade-badge.fail { background: #da3633; color: #fff; }

  /* Center - screenshot viewer */
  .viewer { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .viewer-header { padding: 10px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .viewer-header .query-text { font-size: 13px; color: #c9d1d9; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .viewer-header .screenshot-nav { display: flex; align-items: center; gap: 8px; }
  .viewer-header .screenshot-nav button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .viewer-header .screenshot-nav button:hover { background: #30363d; }
  .viewer-header .screenshot-nav button:disabled { opacity: 0.3; cursor: default; }
  .viewer-header .screenshot-nav .counter { font-size: 12px; color: #8b949e; min-width: 50px; text-align: center; }
  .screenshot-container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 16px; background: #010409; }
  .screenshot-container img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px; border: 1px solid #30363d; }
  .screenshot-container .placeholder { color: #484f58; font-size: 14px; }

  /* Right panel - stream */
  .stream-panel { width: 360px; border-left: 1px solid #30363d; display: flex; flex-direction: column; flex-shrink: 0; background: #0d1117; }
  .stream-header { padding: 10px 14px; background: #161b22; border-bottom: 1px solid #30363d; font-size: 13px; font-weight: 600; color: #8b949e; flex-shrink: 0; }
  .stream-body { flex: 1; overflow-y: auto; padding: 8px; }
  .stream-entry { padding: 6px 8px; margin-bottom: 4px; border-radius: 4px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; }
  .stream-entry.tool-call { background: #1a1d23; border-left: 3px solid #58a6ff; }
  .stream-entry.tool-call .entry-label { color: #58a6ff; font-weight: 600; font-family: monospace; }
  .stream-entry.tool-call .entry-body { color: #8b949e; margin-top: 2px; word-break: break-word; }
  .stream-entry.delegation { background: #1c1d2e; border-left: 3px solid #bc8cff; }
  .stream-entry.delegation .entry-label { color: #bc8cff; font-weight: 600; }
  .stream-entry.delegation .entry-body { color: #c9d1d9; margin-top: 2px; white-space: pre-wrap; word-break: break-word; }
  .stream-entry.actions { background: #1a1d23; border-left: 3px solid #f0883e; }
  .stream-entry.actions .entry-label { color: #f0883e; font-weight: 600; }
  .stream-entry.actions .action-list { color: #8b949e; margin-top: 2px; }
  .stream-entry.actions .action-item { margin: 1px 0; }
  .stream-entry.actions .action-ok { color: #3fb950; }
  .stream-entry.actions .action-fail { color: #f85149; }
  .stream-entry.result { background: #161b22; border-left: 3px solid #58a6ff; }
  .stream-entry.result .entry-label { color: #58a6ff; font-weight: 600; }
  .stream-entry.result .entry-body { color: #8b949e; margin-top: 2px; white-space: pre-wrap; word-break: break-word; }
  .stream-entry.model-text { background: #1c2128; border-left: 3px solid #3fb950; color: #c9d1d9; white-space: pre-wrap; word-break: break-word; }
  .stream-entry.error { background: #2d1215; border-left: 3px solid #f85149; color: #f85149; }
  .stream-entry.nav { background: #1c1d21; border-left: 3px solid #d29922; color: #d29922; }

  /* Grader result panel */
  .grader-panel { border-top: 1px solid #30363d; background: #161b22; flex-shrink: 0; overflow-y: auto; max-height: 260px; }
  .grader-panel:empty { display: none; }
  .grader-panel-header { padding: 8px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #21262d; }
  .grader-panel-header .grader-name { font-size: 12px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.3px; }
  .grader-panel-header .grader-score { font-size: 13px; font-weight: 700; margin-left: auto; }
  .grader-panel-header .grader-score.pass { color: #3fb950; }
  .grader-panel-header .grader-score.fail { color: #f85149; }
  .grader-panel-body { padding: 8px 16px 12px; }
  .grader-axes { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px 16px; }
  .grader-axis { display: flex; flex-direction: column; gap: 2px; padding: 6px 8px; background: #0d1117; border-radius: 4px; border-left: 3px solid #30363d; }
  .grader-axis-head { display: flex; align-items: center; gap: 8px; }
  .grader-axis-name { font-size: 11px; font-weight: 600; color: #c9d1d9; }
  .grader-axis-score { font-size: 11px; font-weight: 700; margin-left: auto; }
  .grader-axis-score.high { color: #3fb950; }
  .grader-axis-score.mid { color: #d29922; }
  .grader-axis-score.low { color: #f85149; }
  .grader-axis-bar { height: 3px; background: #21262d; border-radius: 2px; overflow: hidden; }
  .grader-axis-bar-fill { height: 100%; border-radius: 2px; }
  .grader-axis-reasoning { font-size: 10px; color: #8b949e; margin-top: 2px; line-height: 1.4; }
  .grader-verifiers { display: flex; flex-direction: column; gap: 6px; }
  .grader-verifier { display: flex; align-items: center; gap: 10px; padding: 6px 8px; background: #0d1117; border-radius: 4px; }
  .grader-verifier-name { font-size: 11px; font-weight: 600; color: #c9d1d9; min-width: 90px; }
  .grader-verifier-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; }
  .grader-verifier-badge.pass { background: #238636; color: #fff; }
  .grader-verifier-badge.fail { background: #da3633; color: #fff; }
  .grader-reasoning-text { font-size: 11px; color: #8b949e; line-height: 1.5; white-space: pre-wrap; word-break: break-word; max-height: 120px; overflow-y: auto; }

  /* Stop button */
  .btn-stop { background: #da3633; color: #fff; border: none; padding: 4px 14px; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; margin-left: 12px; }
  .btn-stop:hover { background: #f85149; }
  .btn-stop:disabled { background: #6e2b2b; cursor: default; }

  /* Empty states */
  .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #484f58; font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Eval Dashboard</h1>
  <span class="config" id="config-name"></span>
  <div class="progress">
    <span id="progress-text">0 / 0</span>
    &nbsp;&middot;&nbsp;
    <span class="pass" id="pass-count">0 pass</span>
    &nbsp;
    <span class="fail" id="fail-count">0 fail</span>
  </div>
  <button class="btn-stop" id="btn-stop" onclick="stopEval()" style="display:none">Stop</button>
</div>

<!-- Collapsible config panel -->
<div class="config-panel" id="config-panel">
  <div class="config-header" onclick="toggleConfigPanel()">
    <span>Configuration</span>
    <span class="config-summary" id="config-summary"></span>
    <button class="config-toggle" id="config-toggle-btn">&#9660;</button>
  </div>
  <div class="config-body" id="config-body">
    <div class="config-form">

      <!-- Agent Config (left) -->
      <div class="config-section">
        <h3>Agent</h3>
        <div class="config-field">
          <label>Agent Type <span class="req">*</span></label>
          <select id="cfg-agent-type" onchange="onAgentTypeChange(this.value)">
            <option value="single">Single Agent</option>
            <option value="orchestrator-executor">Orchestrator-Executor</option>
            <option value="gemini-computer-use">Gemini Computer Use</option>
            <option value="yutori-navigator">Yutori Navigator</option>
          </select>
        </div>

        <!-- Single agent fields -->
        <div class="agent-fields active" id="fields-single">
          <div class="config-field">
            <label>Provider <span class="req">*</span></label>
            <select id="cfg-single-provider">
              <option value="openai-compatible">OpenAI Compatible</option>
              <option value="anthropic">Anthropic</option>
              <option value="openai">OpenAI</option>
              <option value="google">Google</option>
              <option value="openrouter">OpenRouter</option>
              <option value="azure">Azure</option>
              <option value="ollama">Ollama</option>
              <option value="lmstudio">LM Studio</option>
              <option value="bedrock">Bedrock</option>
              <option value="browseros">ThriveOS</option>
            </select>
          </div>
          <div class="config-field">
            <label>Model</label>
            <input type="text" id="cfg-single-model" value="accounts/fireworks/models/kimi-k2p5">
          </div>
          <div class="config-field">
            <label>API Key</label>
            <input type="password" id="cfg-single-apikey" value="FIREWORKS_API_KEY">
          </div>
          <div class="config-field">
            <label>Base URL (optional)</label>
            <input type="text" id="cfg-single-baseurl" value="https://api.fireworks.ai/inference/v1">
          </div>
        </div>

        <!-- Orchestrator-Executor fields -->
        <div class="agent-fields" id="fields-orchestrator-executor">
          <div class="agent-sub-section">
            <h4>Orchestrator</h4>
            <div class="config-field">
              <label>Provider <span class="req">*</span></label>
              <select id="cfg-orch-provider">
                <option value="openai-compatible">OpenAI Compatible</option>
                <option value="anthropic">Anthropic</option>
                <option value="openai">OpenAI</option>
                <option value="google">Google</option>
                <option value="openrouter">OpenRouter</option>
              </select>
            </div>
            <div class="config-field">
              <label>Model <span class="req">*</span></label>
              <input type="text" id="cfg-orch-model" value="accounts/fireworks/models/kimi-k2p5">
            </div>
            <div class="config-field">
              <label>API Key <span class="req">*</span></label>
              <input type="password" id="cfg-orch-apikey" value="FIREWORKS_API_KEY">
            </div>
            <div class="config-field">
              <label>Base URL <span class="req">*</span></label>
              <input type="text" id="cfg-orch-baseurl" value="https://api.fireworks.ai/inference/v1">
            </div>
          </div>
          <div class="agent-sub-section">
            <h4>Executor</h4>
            <div class="config-field">
              <label>Provider <span class="req">*</span></label>
              <select id="cfg-exec-provider" onchange="onExecutorProviderChange(this.value)">
                <option value="clado-action">Clado Action</option>
                <option value="openai-compatible">OpenAI Compatible</option>
                <option value="anthropic">Anthropic</option>
                <option value="openai">OpenAI</option>
                <option value="google">Google</option>
              </select>
            </div>
            <div class="config-field">
              <label>Model <span class="req">*</span></label>
              <input type="text" id="cfg-exec-model" value="qwen3-vl-30b-a3b-instruct">
            </div>
            <div class="config-field">
              <label>API Key</label>
              <input type="password" id="cfg-exec-apikey" value="">
            </div>
            <div class="config-field">
              <label>Base URL <span class="req">*</span></label>
              <input type="text" id="cfg-exec-baseurl" value="https://clado-ai--clado-browseros-action-actionmodel-generate.modal.run">
            </div>
          </div>
        </div>

        <!-- Gemini Computer Use fields -->
        <div class="agent-fields" id="fields-gemini-computer-use">
          <div class="config-field">
            <label>API Key <span class="req">*</span></label>
            <input type="password" id="cfg-gemini-apikey" placeholder="GOOGLE_AI_API_KEY">
          </div>
          <div class="config-row">
            <div class="config-field">
              <label>Screen Width</label>
              <input type="number" id="cfg-gemini-width" value="1440" min="800" max="2560">
            </div>
            <div class="config-field">
              <label>Screen Height</label>
              <input type="number" id="cfg-gemini-height" value="900" min="600" max="1440">
            </div>
          </div>
          <div class="config-field">
            <label>Turn Limit</label>
            <input type="number" id="cfg-gemini-turns" value="30" min="1" max="100">
          </div>
        </div>

        <!-- Yutori Navigator fields -->
        <div class="agent-fields" id="fields-yutori-navigator">
          <div class="config-field">
            <label>API Key <span class="req">*</span></label>
            <input type="password" id="cfg-yutori-apikey" placeholder="YUTORI_API_KEY">
          </div>
          <div class="config-row">
            <div class="config-field">
              <label>Screen Width</label>
              <input type="number" id="cfg-yutori-width" value="1280" min="800" max="2560">
            </div>
            <div class="config-field">
              <label>Screen Height</label>
              <input type="number" id="cfg-yutori-height" value="800" min="600" max="1440">
            </div>
          </div>
          <div class="config-field">
            <label>Turn Limit</label>
            <input type="number" id="cfg-yutori-turns" value="30" min="1" max="100">
          </div>
        </div>

      </div>

      <!-- Infrastructure (center) -->
      <div class="config-section">
        <h3>Infrastructure</h3>
        <div class="config-field">
          <label>ThriveOS Server URL <span class="req">*</span></label>
          <input type="text" id="cfg-server-url" value="http://127.0.0.1:9110">
        </div>
        <div class="config-row">
          <div class="config-field">
            <label>Base CDP Port</label>
            <input type="number" id="cfg-cdp-port" value="9010">
          </div>
          <div class="config-field">
            <label>Base Server Port</label>
            <input type="number" id="cfg-server-port" value="9110">
          </div>
          <div class="config-field">
            <label>Base Ext Port</label>
            <input type="number" id="cfg-ext-port" value="9310">
          </div>
        </div>
        <div class="config-row">
          <div class="config-field">
            <label>Workers</label>
            <input type="number" id="cfg-workers" value="1" min="1" max="20">
          </div>
          <div class="config-field">
            <label>Timeout (ms)</label>
            <input type="number" id="cfg-timeout" value="1800000" min="30000" max="3600000">
          </div>
        </div>
        <div class="config-row" style="gap: 16px;">
          <div class="config-field-inline">
            <input type="checkbox" id="cfg-headless">
            <label for="cfg-headless">Headless</label>
          </div>
          <div class="config-field-inline">
            <input type="checkbox" id="cfg-extensions">
            <label for="cfg-extensions">Load Extensions</label>
          </div>
          <div class="config-field-inline">
            <input type="checkbox" id="cfg-restart">
            <label for="cfg-restart">Restart per task</label>
          </div>
        </div>
      </div>

      <!-- Dataset + Grader (right) -->
      <div class="config-section">
        <h3>Dataset</h3>
        <div class="config-field">
          <label>Dataset</label>
          <select id="cfg-dataset-select" onchange="onDatasetSelect(this.value)">
            <optgroup label="WebBench READ-only (0/4 — All Agents Fail)">
              <option value="../data/webbench-0of4-50.jsonl">WebBench 0/4 Sample (50 tasks)</option>
              <option value="../data/webbench-0of4.jsonl">WebBench 0/4 Full (68 tasks)</option>
            </optgroup>
            <optgroup label="WebBench READ-only (1/4 — 1 Agent Passes)">
              <option value="../data/webbench-1of4-50.jsonl">WebBench 1/4 Sample (50 tasks)</option>
              <option value="../data/webbench-1of4.jsonl">WebBench 1/4 Full (120 tasks)</option>
            </optgroup>
            <optgroup label="WebBench READ-only (2/4 — 2 Agents Pass)">
              <option value="../data/webbench-2of4-50.jsonl">WebBench 2/4 Sample (50 tasks)</option>
              <option value="../data/webbench-2of4.jsonl">WebBench 2/4 Full (199 tasks)</option>
            </optgroup>
            <optgroup label="BrowseComp (OpenAI — info retrieval, no auth)">
              <option value="../data/browsecomp-medium-hard-50.jsonl">BrowseComp Medium-Hard (50 tasks)</option>
              <option value="../data/browsecomp-very-hard-50.jsonl">BrowseComp Very Hard (50 tasks)</option>
            </optgroup>
            <optgroup label="WebVoyager">
              <option value="../data/webvoyager_e2e_test.jsonl">WebVoyager Test (10 tasks)</option>
              <option value="../data/webvoyager.jsonl">WebVoyager Full</option>
            </optgroup>
            <optgroup label="Mind2Web">
              <option value="../data/mind2web_e2e_test.jsonl">Mind2Web Test (10 tasks)</option>
              <option value="../data/mind2web.jsonl">Mind2Web Full</option>
            </optgroup>
            <option value="custom">Custom path...</option>
          </select>
        </div>
        <div class="config-field" id="cfg-dataset-custom-field" style="display:none;">
          <label>Custom Dataset Path</label>
          <input type="text" id="cfg-dataset" placeholder="../data/your-dataset.jsonl">
        </div>
        <div class="config-field">
          <label>Output Dir (optional)</label>
          <input type="text" id="cfg-output-dir" placeholder="Auto-generated if empty">
        </div>

        <h3 style="margin-top: 8px;">Grader</h3>
        <div class="config-field">
          <label>Graders</label>
          <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 2px;">
            <div class="config-field-inline"><input type="checkbox" id="cfg-grader-performance" value="performance_grader"><label for="cfg-grader-performance">Performance Grader</label></div>
            <div class="config-field-inline"><input type="checkbox" id="cfg-grader-webvoyager" value="webvoyager_grader"><label for="cfg-grader-webvoyager">WebVoyager Grader</label></div>
            <div class="config-field-inline"><input type="checkbox" id="cfg-grader-fara" value="fara_combined"><label for="cfg-grader-fara">Fara Combined</label></div>
            <div class="config-field-inline"><input type="checkbox" id="cfg-grader-mind2web" value="mind2web_judge"><label for="cfg-grader-mind2web">Mind2Web Judge</label></div>
          </div>
        </div>
        <div class="config-field">
          <label>Grader Model</label>
          <input type="text" id="cfg-grader-model" placeholder="e.g. openai/gpt-4.1">
        </div>
        <div class="config-field">
          <label>Grader API Key</label>
          <input type="password" id="cfg-grader-key-env" placeholder="Key or env var e.g. OPENROUTER_API_KEY">
        </div>
        <div class="config-field">
          <label>Grader Base URL</label>
          <input type="text" id="cfg-grader-baseurl" placeholder="https://openrouter.ai/api/v1">
        </div>
      </div>

      <!-- Actions bar (full width) -->
      <div class="config-actions">
        <div class="load-config">
          <label>Load config:</label>
          <select id="cfg-load-select" onchange="loadSavedConfig(this.value)">
            <option value="">-- select --</option>
          </select>
        </div>
        <input type="file" id="cfg-file-input" accept=".json" style="display:none" onchange="loadConfigFromFile(this)">
        <button class="btn-secondary" onclick="document.getElementById('cfg-file-input').click()">Load File</button>
        <button class="btn-secondary" onclick="saveConfigToFile()">Save Config</button>
        <span class="config-error" id="config-error"></span>
        <button class="btn-run" id="btn-run" onclick="submitConfig()">Run Eval</button>
      </div>

      <!-- Load previous run -->
      <div class="config-actions">
        <div class="load-config">
          <label>Load run:</label>
          <select id="cfg-run-select">
            <option value="">-- select --</option>
          </select>
        </div>
        <button class="btn-secondary" onclick="loadPreviousRun()">Load Run</button>
      </div>

    </div>
  </div>
</div>

<div class="main">
  <!-- Left sidebar -->
  <div class="sidebar" id="task-list"></div>

  <!-- Center viewer -->
  <div class="viewer">
    <div class="viewer-header">
      <div class="query-text" id="viewer-query">Select a task to view</div>
      <div class="screenshot-nav">
        <button id="btn-prev" onclick="prevScreenshot()" disabled>&larr;</button>
        <span class="counter" id="screenshot-counter">-</span>
        <button id="btn-next" onclick="nextScreenshot()" disabled>&rarr;</button>
        <button id="btn-play" onclick="toggleAutoplay()" disabled>&#9654;</button>
      </div>
    </div>
    <div class="screenshot-container" id="screenshot-container">
      <div class="placeholder">Waiting for eval to start...</div>
    </div>
    <div class="grader-panel" id="grader-panel"></div>
  </div>

  <!-- Right stream panel -->
  <div class="stream-panel">
    <div class="stream-header">Agent Stream</div>
    <div class="stream-body" id="stream-body">
      <div class="empty-state">Events will appear here</div>
    </div>
  </div>
</div>

<script>
// ============================================================================
// State
// ============================================================================
let tasks = [];
let selectedTaskId = null;
let autoFollow = true;
let screenshotIndex = 0;
let autoplayInterval = null;
const streamEvents = {};
let completedCount = 0;
let passCount = 0;
let failCount = 0;
let loadedConfigName = null;

const PASS_FAIL_GRADER_ORDER = ['performance_grader', 'webvoyager_grader', 'fara_combined', 'fara_grader'];
function getPrimaryGrader(graderResults) {
  for (const name of PASS_FAIL_GRADER_ORDER) {
    if (graderResults[name]) return graderResults[name];
  }
  const vals = Object.values(graderResults);
  return vals.length ? vals[0] : null;
}

// ============================================================================
// Init
// ============================================================================
async function init() {
  // Check dashboard mode
  const modeRes = await fetch('/api/mode');
  const mode = await modeRes.json();

  // Load initial state
  const stateRes = await fetch('/api/state');
  const state = await stateRes.json();
  document.getElementById('config-name').textContent =
    state.configName ? `${state.configName} \u00B7 ${state.agentType}` : '';
  tasks = state.tasks;

  // Load saved configs into dropdown
  loadConfigList();
  loadRunList();

  if (mode.configMode) {
    // Config mode — show panel expanded
    setConfigPanelOpen(true);
  } else {
    // Run mode — panel collapsed, show summary
    setConfigPanelOpen(false);
    updateConfigSummary(state.configName, state.agentType);
  }

  // Show stop button if eval is already running (page refresh)
  if (mode.running) {
    setEvalRunningUI(true);
  }

  renderTaskList();
  updateProgress();
  connectSSE();
}

// ============================================================================
// Config Panel
// ============================================================================
function toggleConfigPanel() {
  const body = document.getElementById('config-body');
  const isOpen = body.classList.contains('open');
  setConfigPanelOpen(!isOpen);
}

function setConfigPanelOpen(open) {
  const body = document.getElementById('config-body');
  const btn = document.getElementById('config-toggle-btn');
  if (open) {
    body.classList.add('open');
    btn.classList.add('open');
  } else {
    body.classList.remove('open');
    btn.classList.remove('open');
  }
}

function updateConfigSummary(configName, agentType) {
  const el = document.getElementById('config-summary');
  if (configName) {
    el.textContent = `${configName} \u00B7 ${agentType}`;
  } else {
    el.textContent = '';
  }
}

// Default presets
const PRESET_K2P5 = {
  provider: 'openai-compatible',
  model: 'accounts/fireworks/models/kimi-k2p5',
  apiKey: 'FIREWORKS_API_KEY',
  baseUrl: 'https://api.fireworks.ai/inference/v1',
};
const PRESET_CLADO = {
  provider: 'clado-action',
  model: 'qwen3-vl-30b-a3b-instruct',
  apiKey: '',
  baseUrl: 'https://clado-ai--clado-browseros-action-actionmodel-generate.modal.run',
};

function onAgentTypeChange(type) {
  // Hide all agent field sections
  document.querySelectorAll('.agent-fields').forEach(el => el.classList.remove('active'));
  // Show the selected one
  const target = document.getElementById(`fields-${type}`);
  if (target) target.classList.add('active');

  // Auto-populate defaults
  if (type === 'single') {
    setVal('cfg-single-provider', PRESET_K2P5.provider);
    setVal('cfg-single-model', PRESET_K2P5.model);
    setVal('cfg-single-apikey', PRESET_K2P5.apiKey);
    setVal('cfg-single-baseurl', PRESET_K2P5.baseUrl);
  } else if (type === 'orchestrator-executor') {
    // Orchestrator always K2.5
    setVal('cfg-orch-provider', PRESET_K2P5.provider);
    setVal('cfg-orch-model', PRESET_K2P5.model);
    setVal('cfg-orch-apikey', PRESET_K2P5.apiKey);
    setVal('cfg-orch-baseurl', PRESET_K2P5.baseUrl);
    // Executor defaults based on current provider selection
    onExecutorProviderChange(getVal('cfg-exec-provider'));
  }
}

function onExecutorProviderChange(provider) {
  if (provider === 'clado-action') {
    setVal('cfg-exec-model', PRESET_CLADO.model);
    setVal('cfg-exec-apikey', PRESET_CLADO.apiKey);
    setVal('cfg-exec-baseurl', PRESET_CLADO.baseUrl);
  } else {
    setVal('cfg-exec-model', PRESET_K2P5.model);
    setVal('cfg-exec-apikey', PRESET_K2P5.apiKey);
    setVal('cfg-exec-baseurl', PRESET_K2P5.baseUrl);
    setVal('cfg-exec-provider', PRESET_K2P5.provider);
  }
}

function onDatasetSelect(value) {
  const customField = document.getElementById('cfg-dataset-custom-field');
  if (value === 'custom') {
    customField.style.display = '';
    document.getElementById('cfg-dataset').focus();
  } else {
    customField.style.display = 'none';
    document.getElementById('cfg-dataset').value = '';
  }
}

async function loadConfigList() {
  try {
    const res = await fetch('/api/configs');
    const files = await res.json();
    const sel = document.getElementById('cfg-load-select');
    sel.innerHTML = '<option value="">-- select --</option>';
    files.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f;
      sel.appendChild(opt);
    });
  } catch {}
}

async function loadRunList() {
  try {
    const res = await fetch('/api/runs');
    const runs = await res.json();
    const sel = document.getElementById('cfg-run-select');
    sel.innerHTML = '<option value="">-- select --</option>';
    runs.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r;
      opt.textContent = r;
      sel.appendChild(opt);
    });
  } catch {}
}

async function loadPreviousRun() {
  const runName = document.getElementById('cfg-run-select').value;
  if (!runName) return;
  const errEl = document.getElementById('config-error');
  errEl.textContent = '';
  try {
    const res = await fetch('/api/load-run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ runName }),
    });
    const result = await res.json();
    if (!res.ok) {
      errEl.textContent = result.error || 'Failed to load run';
      return;
    }
    const stateRes = await fetch('/api/state');
    const state = await stateRes.json();
    document.getElementById('config-name').textContent =
      state.configName ? `${state.configName} \u00B7 ${state.agentType}` : '';
    tasks = state.tasks;
    setConfigPanelOpen(false);
    updateConfigSummary(state.configName, state.agentType);
    selectedTaskId = null;
    renderTaskList();
    updateProgress();
    if (tasks.length > 0) selectTask(tasks[0].queryId);
  } catch (e) {
    errEl.textContent = `Network error: ${e.message}`;
  }
}

async function loadSavedConfig(name) {
  if (!name) return;
  try {
    const res = await fetch(`/api/config/${encodeURIComponent(name)}`);
    if (!res.ok) return;
    const cfg = await res.json();
    loadedConfigName = name;
    fillForm(cfg);
  } catch {}
}

// Fill form fields from a config object
function fillForm(cfg) {
  const agent = cfg.agent || {};
  const type = agent.type || 'single';

  // Set agent type and trigger field visibility
  document.getElementById('cfg-agent-type').value = type;
  onAgentTypeChange(type);

  if (type === 'single') {
    setVal('cfg-single-provider', agent.provider);
    setVal('cfg-single-model', agent.model);
    setVal('cfg-single-apikey', agent.apiKey);
    setVal('cfg-single-baseurl', agent.baseUrl);
  } else if (type === 'orchestrator-executor') {
    const orch = agent.orchestrator || {};
    const exec = agent.executor || {};
    setVal('cfg-orch-provider', orch.provider);
    setVal('cfg-orch-model', orch.model);
    setVal('cfg-orch-apikey', orch.apiKey);
    setVal('cfg-orch-baseurl', orch.baseUrl);
    setVal('cfg-exec-provider', exec.provider);
    setVal('cfg-exec-model', exec.model);
    setVal('cfg-exec-apikey', exec.apiKey);
    setVal('cfg-exec-baseurl', exec.baseUrl);
  } else if (type === 'gemini-computer-use') {
    setVal('cfg-gemini-apikey', agent.apiKey);
    if (agent.screenSize) {
      setVal('cfg-gemini-width', agent.screenSize.width);
      setVal('cfg-gemini-height', agent.screenSize.height);
    }
    setVal('cfg-gemini-turns', agent.turnLimit);
  } else if (type === 'yutori-navigator') {
    setVal('cfg-yutori-apikey', agent.apiKey);
    if (agent.screenSize) {
      setVal('cfg-yutori-width', agent.screenSize.width);
      setVal('cfg-yutori-height', agent.screenSize.height);
    }
    setVal('cfg-yutori-turns', agent.turnLimit);
  }

  // Infrastructure
  const bos = cfg.browseros || {};
  setVal('cfg-server-url', bos.server_url);
  setVal('cfg-cdp-port', bos.base_cdp_port);
  setVal('cfg-server-port', bos.base_server_port);
  setVal('cfg-ext-port', bos.base_extension_port);
  document.getElementById('cfg-headless').checked = bos.headless || false;
  document.getElementById('cfg-extensions').checked = bos.load_extensions || false;
  document.getElementById('cfg-restart').checked = cfg.restart_server_per_task || false;

  // Dataset — try to match a dropdown option, fall back to custom
  const datasetSel = document.getElementById('cfg-dataset-select');
  const datasetVal = cfg.dataset || '';
  const matchOption = [...datasetSel.options].find(o => o.value === datasetVal);
  if (matchOption) {
    datasetSel.value = datasetVal;
    document.getElementById('cfg-dataset-custom-field').style.display = 'none';
    document.getElementById('cfg-dataset').value = '';
  } else if (datasetVal) {
    datasetSel.value = 'custom';
    document.getElementById('cfg-dataset-custom-field').style.display = '';
    document.getElementById('cfg-dataset').value = datasetVal;
  }
  setVal('cfg-output-dir', cfg.output_dir);
  setVal('cfg-workers', cfg.num_workers);
  setVal('cfg-timeout', cfg.timeout_ms);

  // Grader checkboxes
  const graderMap = {
    'performance_grader': 'cfg-grader-performance',
    'webvoyager_grader': 'cfg-grader-webvoyager',
    'fara_combined': 'cfg-grader-fara',
    'mind2web_judge': 'cfg-grader-mind2web',
  };
  const configGraders = cfg.graders || [];
  for (const [name, id] of Object.entries(graderMap)) {
    document.getElementById(id).checked = configGraders.includes(name);
  }
  setVal('cfg-grader-model', cfg.grader_model);
  setVal('cfg-grader-key-env', cfg.grader_api_key_env);
  setVal('cfg-grader-baseurl', cfg.grader_base_url);
}

function setVal(id, val) {
  const el = document.getElementById(id);
  if (el && val !== undefined && val !== null) el.value = val;
}

function getVal(id) {
  return document.getElementById(id)?.value?.trim() || '';
}

// Build config object from form
function buildConfigFromForm() {
  const type = getVal('cfg-agent-type');
  let agent;

  if (type === 'single') {
    agent = {
      type: 'single',
      provider: getVal('cfg-single-provider'),
      model: getVal('cfg-single-model') || undefined,
      apiKey: getVal('cfg-single-apikey') || undefined,
      baseUrl: getVal('cfg-single-baseurl') || undefined,
    };
  } else if (type === 'orchestrator-executor') {
    agent = {
      type: 'orchestrator-executor',
      orchestrator: {
        provider: getVal('cfg-orch-provider'),
        model: getVal('cfg-orch-model') || undefined,
        apiKey: getVal('cfg-orch-apikey') || undefined,
        baseUrl: getVal('cfg-orch-baseurl') || undefined,
      },
      executor: {
        provider: getVal('cfg-exec-provider'),
        model: getVal('cfg-exec-model') || undefined,
        apiKey: getVal('cfg-exec-apikey') || undefined,
        baseUrl: getVal('cfg-exec-baseurl') || undefined,
      },
    };
  } else if (type === 'gemini-computer-use') {
    agent = {
      type: 'gemini-computer-use',
      apiKey: getVal('cfg-gemini-apikey'),
      screenSize: {
        width: parseInt(getVal('cfg-gemini-width'), 10) || 1440,
        height: parseInt(getVal('cfg-gemini-height'), 10) || 900,
      },
      turnLimit: parseInt(getVal('cfg-gemini-turns'), 10) || 30,
    };
  } else if (type === 'yutori-navigator') {
    agent = {
      type: 'yutori-navigator',
      apiKey: getVal('cfg-yutori-apikey'),
      screenSize: {
        width: parseInt(getVal('cfg-yutori-width'), 10) || 1280,
        height: parseInt(getVal('cfg-yutori-height'), 10) || 800,
      },
      turnLimit: parseInt(getVal('cfg-yutori-turns'), 10) || 30,
    };
  }

  // Dataset: use dropdown value unless custom is selected
  const datasetSel = getVal('cfg-dataset-select');
  const dataset = datasetSel === 'custom' ? getVal('cfg-dataset') : datasetSel;

  const config = {
    agent,
    dataset: dataset || '../data/webvoyager_e2e_test.jsonl',
    num_workers: parseInt(getVal('cfg-workers'), 10) || 1,
    browseros: {
      server_url: getVal('cfg-server-url') || 'http://127.0.0.1:9110',
      base_cdp_port: parseInt(getVal('cfg-cdp-port'), 10) || 9010,
      base_server_port: parseInt(getVal('cfg-server-port'), 10) || 9110,
      base_extension_port: parseInt(getVal('cfg-ext-port'), 10) || 9310,
      load_extensions: document.getElementById('cfg-extensions').checked,
      headless: document.getElementById('cfg-headless').checked,
    },
    restart_server_per_task: document.getElementById('cfg-restart').checked,
  };

  // Optional fields
  const outputDir = getVal('cfg-output-dir');
  if (outputDir) config.output_dir = outputDir;
  const timeoutMs = parseInt(getVal('cfg-timeout'), 10);
  if (timeoutMs) config.timeout_ms = timeoutMs;
  const selectedGraders = ['cfg-grader-performance', 'cfg-grader-webvoyager', 'cfg-grader-fara', 'cfg-grader-mind2web']
    .filter(id => document.getElementById(id).checked)
    .map(id => document.getElementById(id).value);
  if (selectedGraders.length) config.graders = selectedGraders;
  const graderModel = getVal('cfg-grader-model');
  if (graderModel) config.grader_model = graderModel;
  const graderKeyEnv = getVal('cfg-grader-key-env');
  if (graderKeyEnv) config.grader_api_key_env = graderKeyEnv;
  const graderBaseUrl = getVal('cfg-grader-baseurl');
  if (graderBaseUrl) config.grader_base_url = graderBaseUrl;

  return config;
}

async function submitConfig() {
  const errEl = document.getElementById('config-error');
  errEl.textContent = '';

  const config = buildConfigFromForm();

  // Basic client-side validation
  if (!config.agent) {
    errEl.textContent = 'Agent configuration is required';
    return;
  }

  const btn = document.getElementById('btn-run');
  btn.disabled = true;
  btn.textContent = 'Starting...';

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ config, configName: loadedConfigName }),
    });
    const result = await res.json();

    if (!res.ok) {
      const details = result.details ? `\n${result.details.join('\n')}` : '';
      errEl.textContent = (result.error || 'Failed to start eval') + details;
      btn.disabled = false;
      btn.textContent = 'Run Eval';
      return;
    }

    // Eval started — collapse panel, refresh state
    setConfigPanelOpen(false);
    updateConfigSummary(loadedConfigName || 'dashboard', config.agent.type);

    // Re-fetch state to get the loaded tasks
    const stateRes = await fetch('/api/state');
    const state = await stateRes.json();
    document.getElementById('config-name').textContent =
      `${state.configName} \u00B7 ${state.agentType}`;
    tasks = state.tasks;
    autoFollow = true;
    renderTaskList();
    updateProgress();

    setEvalRunningUI(true);
  } catch (e) {
    errEl.textContent = `Network error: ${e.message}`;
    btn.disabled = false;
    btn.textContent = 'Run Eval';
  }
}

async function stopEval() {
  const btn = document.getElementById('btn-stop');
  btn.disabled = true;
  btn.textContent = 'Stopping...';
  try {
    const res = await fetch('/api/stop', { method: 'POST' });
    if (!res.ok) {
      btn.disabled = false;
      btn.textContent = 'Stop';
    }
  } catch {
    btn.disabled = false;
    btn.textContent = 'Stop';
  }
}

function setEvalRunningUI(running) {
  const stopBtn = document.getElementById('btn-stop');
  const runBtn = document.getElementById('btn-run');
  if (running) {
    stopBtn.style.display = '';
    stopBtn.disabled = false;
    stopBtn.textContent = 'Stop';
    runBtn.disabled = true;
    runBtn.textContent = 'Running...';
  } else {
    stopBtn.style.display = 'none';
    runBtn.disabled = false;
    runBtn.textContent = 'Run Eval';
  }
}

// ============================================================================
// SSE Connection
// ============================================================================
function connectSSE() {
  const es = new EventSource('/api/events');
  es.onmessage = (e) => {
    if (!e.data) return;
    const event = JSON.parse(e.data);
    handleEvent(event);
  };
  es.onerror = () => {
    setTimeout(connectSSE, 3000);
    es.close();
  };
}

function handleEvent(event) {
  // Eval stopped by user
  if (event.type === 'eval-stopped') {
    setEvalRunningUI(false);
    return;
  }

  const taskId = event.taskId;

  // Handle new tasks appearing after POST /api/run (task may not exist in local state yet)
  if (event.type === 'task-state') {
    let task = tasks.find(t => t.queryId === taskId);
    if (!task) {
      // Task came from a dashboard-initiated run — add to local state
      task = { queryId: taskId, query: '', status: 'pending', screenshotCount: 0 };
      tasks.push(task);
    }
    task.status = event.status;
    if (event.durationMs) task.durationMs = event.durationMs;
    if (event.graderResults) task.graderResults = event.graderResults;
    if (event.screenshotCount !== undefined) task.screenshotCount = event.screenshotCount;
    renderTaskList();
    updateProgress();
    if (taskId === selectedTaskId && event.graderResults) renderGraderPanel();

    // Re-enable run button when eval finishes naturally
    if (tasks.length > 0 && tasks.every(t => ['completed', 'failed', 'timeout'].includes(t.status))) {
      setEvalRunningUI(false);
    }

    // Auto-follow: select newly running task
    if (event.status === 'running' && autoFollow) {
      selectTask(taskId);
    }
    return;
  }

  // Screenshot captured
  if (event.type === 'screenshot-captured' && event.screenshot) {
    const task = tasks.find(t => t.queryId === taskId);
    if (task) {
      task.screenshotCount = event.screenshot;
      if (taskId === selectedTaskId) {
        const isRunning = task.status === 'running';
        if (isRunning || screenshotIndex === event.screenshot - 1) {
          screenshotIndex = event.screenshot;
        }
        renderScreenshot();
      }
    }
    return;
  }

  // Also track screenshots from tool-output-available (fallback)
  if (event.type === 'tool-output-available' && event.screenshot) {
    const task = tasks.find(t => t.queryId === taskId);
    if (task && event.screenshot > task.screenshotCount) {
      task.screenshotCount = event.screenshot;
      if (taskId === selectedTaskId) {
        screenshotIndex = event.screenshot;
        renderScreenshot();
      }
    }
  }

  // Stream events — store per task
  if (!streamEvents[taskId]) streamEvents[taskId] = [];

  // Tool inputs (all agent types)
  if (event.type === 'tool-input-available') {
    streamEvents[taskId].push(event);
    if (taskId === selectedTaskId) appendStreamEntry(event);
    return;
  }

  // Tool outputs and errors
  if ((event.type === 'tool-output-available' || event.type === 'tool-output-error') && event.toolCallId) {
    streamEvents[taskId].push(event);
    if (taskId === selectedTaskId) appendStreamEntry(event);
    return;
  }

  // Model text
  if (['text-delta', 'text-end', 'error', 'user'].includes(event.type)) {
    streamEvents[taskId].push(event);
    if (taskId === selectedTaskId) appendStreamEntry(event);
  }
}

// ============================================================================
// Task List
// ============================================================================
function renderTaskList() {
  const el = document.getElementById('task-list');
  el.innerHTML = tasks.map((t, _i) => {
    const isActive = t.queryId === selectedTaskId ? ' active' : '';
    const isRunning = t.status === 'running' ? ' running' : '';
    const dur = t.durationMs ? `${(t.durationMs / 1000).toFixed(1)}s` : '';

    // Show primary grader result (fallback order)
    let graderBadge = '';
    if (t.graderResults) {
      const primary = getPrimaryGrader(t.graderResults);
      if (primary) {
        const pct = typeof primary.score === 'number' ? `${(primary.score * 100).toFixed(0)}%` : (primary.pass ? 'PASS' : 'FAIL');
        graderBadge = `<span class="grade-badge ${primary.pass ? 'pass' : 'fail'}">${pct}</span>`;
      }
    }

    return `<div class="task-item${isActive}${isRunning}" onclick="selectTask('${t.queryId}')">
      <div class="task-id">
        <span class="status-dot ${t.status}"></span>
        ${t.queryId}
        ${graderBadge}
      </div>
      <div class="task-query" title="${escapeHtml(t.query)}">${escapeHtml(t.query)}</div>
      <div class="task-meta">${dur}</div>
    </div>`;
  }).join('');
}

function selectTask(taskId) {
  autoFollow = false;
  selectedTaskId = taskId;
  const task = tasks.find(t => t.queryId === taskId);
  if (!task) return;

  document.getElementById('viewer-query').textContent = task.query;
  screenshotIndex = task.screenshotCount || 0;
  renderScreenshot();
  renderGraderPanel();
  renderStreamForTask(taskId);
  renderTaskList();

  // Re-enable auto-follow if selecting the running task
  const running = tasks.find(t => t.status === 'running');
  if (running && running.queryId === taskId) autoFollow = true;
}

// ============================================================================
// Screenshot Viewer
// ============================================================================
function renderScreenshot() {
  const container = document.getElementById('screenshot-container');
  const counter = document.getElementById('screenshot-counter');
  const task = tasks.find(t => t.queryId === selectedTaskId);
  const max = task ? task.screenshotCount : 0;

  if (!selectedTaskId || max === 0) {
    container.innerHTML = '<div class="placeholder">No screenshots yet</div>';
    counter.textContent = '-';
    updateNavButtons(0, 0);
    return;
  }

  if (screenshotIndex < 1) screenshotIndex = 1;
  if (screenshotIndex > max) screenshotIndex = max;

  container.innerHTML = `<img src="/api/screenshots/${selectedTaskId}/${screenshotIndex}?t=${Date.now()}" alt="Screenshot ${screenshotIndex}">`;
  counter.textContent = `${screenshotIndex} / ${max}`;
  updateNavButtons(screenshotIndex, max);
}

function updateNavButtons(current, max) {
  document.getElementById('btn-prev').disabled = current <= 1;
  document.getElementById('btn-next').disabled = current >= max;
  document.getElementById('btn-play').disabled = max <= 1;
}

function prevScreenshot() { screenshotIndex--; renderScreenshot(); }
function nextScreenshot() { screenshotIndex++; renderScreenshot(); }

function toggleAutoplay() {
  if (autoplayInterval) {
    clearInterval(autoplayInterval);
    autoplayInterval = null;
    document.getElementById('btn-play').textContent = '\u25B6';
  } else {
    document.getElementById('btn-play').textContent = '\u23F8';
    autoplayInterval = setInterval(() => {
      const task = tasks.find(t => t.queryId === selectedTaskId);
      if (!task || screenshotIndex >= task.screenshotCount) {
        toggleAutoplay();
        return;
      }
      screenshotIndex++;
      renderScreenshot();
    }, 1000);
  }
}

// ============================================================================
// Agent Stream
// ============================================================================
async function renderStreamForTask(taskId) {
  const body = document.getElementById('stream-body');
  body.innerHTML = '';
  const events = streamEvents[taskId] || [];
  if (events.length > 0) {
    events.forEach(e => appendStreamEntry(e, false));
    body.scrollTop = body.scrollHeight;
    return;
  }
  const task = tasks.find(t => t.queryId === taskId);
  if (!task || task.status === 'pending' || task.status === 'running') return;
  body.innerHTML = '<div class="empty-state">Loading events...</div>';
  try {
    const res = await fetch(`/api/messages/${taskId}`);
    if (!res.ok) {
      body.innerHTML = '<div class="empty-state">No event log available</div>';
      return;
    }
    const text = await res.text();
    const parsed = text.trim().split('\n').filter(Boolean).map(line => {
      try { return JSON.parse(line); } catch { return null; }
    }).filter(Boolean);
    streamEvents[taskId] = parsed;
    body.innerHTML = '';
    parsed.forEach(e => appendStreamEntry(e, false));
    body.scrollTop = body.scrollHeight;
  } catch {
    body.innerHTML = '<div class="empty-state">Failed to load events</div>';
  }
}

function appendStreamEntry(event, scroll = true) {
  const body = document.getElementById('stream-body');

  const empty = body.querySelector('.empty-state');
  if (empty) empty.remove();

  let html = '';

  // Delegation instruction (orchestrator → executor)
  if (event.type === 'tool-input-available' && event.toolName === 'delegate') {
    const instruction = event.input?.instruction || '';
    html = `<div class="stream-entry delegation">
      <div class="entry-label">Delegation</div>
      <div class="entry-body">${escapeHtml(instruction)}</div>
    </div>`;
  }

  // Generic tool call (all agent types)
  else if (event.type === 'tool-input-available') {
    const inputSummary = formatToolInput(event.toolName, event.input);
    html = `<div class="stream-entry tool-call">
      <div class="entry-label">${escapeHtml(event.toolName)}</div>
      <div class="entry-body">${escapeHtml(inputSummary)}</div>
    </div>`;
  }

  // Tool output — clado actions (parsedActions)
  else if (event.type === 'tool-output-available' && event.output?.parsedActions) {
    const output = event.output;
    const actions = output.parsedActions || [];
    const executed = output.executed || [];

    const actionItems = actions.map((a, i) => {
      const desc = formatAction(a);
      const result = executed[i];
      if (!result) return `<div class="action-item">  ${escapeHtml(desc)}</div>`;
      const failed = result.startsWith('Failed');
      const cls = failed ? 'action-fail' : 'action-ok';
      const icon = failed ? '\u2717' : '\u2713';
      const note = failed ? ` \u2014 ${escapeHtml(result.split(': ').slice(1).join(': '))}` : '';
      return `<div class="action-item"><span class="${cls}">${icon}</span> ${escapeHtml(desc)}${note}</div>`;
    }).join('');

    html = `<div class="stream-entry actions">
      <div class="entry-label">Actions</div>
      <div class="action-list">${actionItems}</div>
    </div>`;
  }

  // Generic tool output
  else if (event.type === 'tool-output-available' && event.output) {
    const summary = formatToolOutput(event.output);
    html = `<div class="stream-entry result">
      <div class="entry-label">Result</div>
      <div class="entry-body">${escapeHtml(summary)}</div>
    </div>`;
  }

  // Tool error
  else if (event.type === 'tool-output-error') {
    let msg = event.errorText || 'Tool execution failed';
    try {
      const parsed = JSON.parse(msg);
      if (parsed.executed) msg = parsed.executed.join('; ');
      else if (parsed.error) msg = parsed.error;
    } catch {}
    html = `<div class="stream-entry error">${escapeHtml(msg)}</div>`;
  }

  // Model text
  else if (event.type === 'text-delta') {
    const last = body.querySelector('.stream-entry.model-text:last-child');
    if (last) {
      last.textContent += event.delta;
      if (scroll) body.scrollTop = body.scrollHeight;
      return;
    }
    html = `<div class="stream-entry model-text">${escapeHtml(event.delta)}</div>`;
  }

  else if (event.type === 'text-end') return;
  else if (event.type === 'error') {
    html = `<div class="stream-entry error">${escapeHtml(event.message || 'Error')}</div>`;
  }

  if (html) {
    body.insertAdjacentHTML('beforeend', html);
    if (scroll) body.scrollTop = body.scrollHeight;
  }
}

function formatToolInput(_toolName, input) {
  if (!input) return '';
  const parts = [];
  for (const [k, v] of Object.entries(input)) {
    if (k === 'page') continue;
    const val = typeof v === 'string' ? v : JSON.stringify(v);
    const truncated = val.length > 80 ? `${val.slice(0, 80)}...` : val;
    parts.push(`${k}: ${truncated}`);
  }
  return parts.join(', ');
}

function formatToolOutput(output) {
  if (typeof output === 'string') return output.slice(0, 200);
  if (output?.content) {
    const content = Array.isArray(output.content) ? output.content : [output.content];
    const texts = content.map(c => typeof c === 'string' ? c : (c?.text || JSON.stringify(c)));
    return texts.join(' ').slice(0, 200);
  }
  const str = JSON.stringify(output);
  return str.length > 200 ? `${str.slice(0, 200)}...` : str;
}

function formatAction(action) {
  if (!action || !action.action) return 'unknown';
  switch (action.action) {
    case 'click': return `click (${action.x}, ${action.y})`;
    case 'double_click': return `double_click (${action.x}, ${action.y})`;
    case 'right_click': return `right_click (${action.x}, ${action.y})`;
    case 'hover': return `hover (${action.x}, ${action.y})`;
    case 'type': return `type "${(action.text || '').slice(0, 60)}${(action.text || '').length > 60 ? '...' : ''}"`;
    case 'press_key': return `press ${action.key}`;
    case 'scroll': return `scroll ${action.direction || 'down'}`;
    case 'drag': return `drag (${action.startX},${action.startY}) \u2192 (${action.endX},${action.endY})`;
    case 'wait': return `wait ${action.time || 1}s`;
    case 'end': return 'end (task complete)';
    case 'navigate': return `navigate ${action.text || ''}`;
    default: return action.action;
  }
}

// ============================================================================
// Progress
// ============================================================================
function updateProgress() {
  completedCount = tasks.filter(t => ['completed', 'failed', 'timeout'].includes(t.status)).length;
  passCount = 0;
  failCount = 0;
  tasks.forEach(t => {
    if (t.graderResults) {
      const primary = getPrimaryGrader(t.graderResults);
      if (primary) {
        if (primary.pass) passCount++;
        else failCount++;
      }
    }
  });

  document.getElementById('progress-text').textContent = `${completedCount} / ${tasks.length}`;
  document.getElementById('pass-count').textContent = `${passCount} pass`;
  document.getElementById('fail-count').textContent = `${failCount} fail`;
}

// ============================================================================
// Grader Result Panel
// ============================================================================
function renderGraderPanel() {
  const panel = document.getElementById('grader-panel');
  const task = tasks.find(t => t.queryId === selectedTaskId);
  if (!task || !task.graderResults) { panel.innerHTML = ''; return; }

  // Find primary grader using fallback order
  let primaryName = null;
  let primaryResult = null;
  for (const name of PASS_FAIL_GRADER_ORDER) {
    if (task.graderResults[name]) { primaryName = name; primaryResult = task.graderResults[name]; break; }
  }
  if (!primaryName) {
    const first = Object.entries(task.graderResults)[0];
    if (first) { primaryName = first[0]; primaryResult = first[1]; }
  }
  if (!primaryName || !primaryResult) { panel.innerHTML = ''; return; }

  const passClass = primaryResult.pass ? 'pass' : 'fail';
  const passLabel = primaryResult.pass ? 'PASS' : 'FAIL';
  const scorePct = typeof primaryResult.score === 'number' ? (primaryResult.score * 100).toFixed(1) : '—';
  const graderLabel = formatGraderName(primaryName);

  let bodyHtml = '';
  if (primaryName === 'performance_grader') {
    bodyHtml = renderPerformanceGrader(primaryResult);
  } else if (primaryName === 'fara_combined' || primaryName === 'fara_grader') {
    bodyHtml = renderFaraCombined(primaryResult);
  } else {
    bodyHtml = renderGenericGrader(primaryResult);
  }

  panel.innerHTML = `
    <div class="grader-panel-header">
      <span class="grader-name">${graderLabel}</span>
      <span class="grader-score ${passClass}">${passLabel} &middot; ${scorePct}%</span>
    </div>
    <div class="grader-panel-body">${bodyHtml}</div>
  `;
}

function formatGraderName(name) {
  return name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function scoreColorClass(score) {
  if (score >= 70) return 'high';
  if (score >= 40) return 'mid';
  return 'low';
}

function barColor(score) {
  if (score >= 70) return '#3fb950';
  if (score >= 40) return '#d29922';
  return '#f85149';
}

function renderPerformanceGrader(result) {
  const details = result.details || {};
  const axes = details.axes;
  if (!axes || typeof axes !== 'object') {
    return renderGenericGrader(result);
  }

  let html = '<div class="grader-axes">';
  for (const [name, axis] of Object.entries(axes)) {
    const score = axis.score || 0;
    const weight = axis.weight || 0;
    const reasoning = escapeHtml(axis.reasoning || '');
    const label = name.replace(/_/g, ' ');
    html += `
      <div class="grader-axis" style="border-left-color: ${barColor(score)}">
        <div class="grader-axis-head">
          <span class="grader-axis-name">${label}</span>
          <span class="grader-axis-score ${scoreColorClass(score)}">${score}/100</span>
          <span style="font-size:10px;color:#6e7681">w:${weight}</span>
        </div>
        <div class="grader-axis-bar"><div class="grader-axis-bar-fill" style="width:${score}%;background:${barColor(score)}"></div></div>
        <div class="grader-axis-reasoning">${reasoning}</div>
      </div>
    `;
  }
  html += '</div>';
  return html;
}

function renderFaraCombined(result) {
  const details = result.details || {};
  const verifiers = details.verifiers;
  const voting = details.votingResult;
  if (!verifiers || typeof verifiers !== 'object') {
    return renderGenericGrader(result);
  }

  let html = '';
  if (voting) {
    html += `<div style="font-size:11px;color:#8b949e;margin-bottom:8px">Majority vote: ${voting.passCount}/${voting.totalVerifiers} passed &rarr; <strong style="color:${voting.decision === 'PASS' ? '#3fb950' : '#f85149'}">${voting.decision}</strong></div>`;
  }
  html += '<div class="grader-verifiers">';
  for (const [name, v] of Object.entries(verifiers)) {
    const badge = v.pass ? '<span class="grader-verifier-badge pass">PASS</span>' : '<span class="grader-verifier-badge fail">FAIL</span>';
    const score = typeof v.score === 'number' ? `${(v.score * 100).toFixed(0)}%` : '';
    const label = name.charAt(0).toUpperCase() + name.slice(1);
    html += `
      <div class="grader-verifier">
        <span class="grader-verifier-name">${label}</span>
        ${badge}
        <span style="font-size:11px;color:#8b949e;margin-left:auto">${score}</span>
      </div>
    `;
  }
  html += '</div>';
  return html;
}

function renderGenericGrader(result) {
  const reasoning = result.reasoning || '';
  if (!reasoning) return '';
  return `<div class="grader-reasoning-text">${escapeHtml(reasoning)}</div>`;
}

// ============================================================================
// File I/O (Save / Load Config)
// ============================================================================
function loadConfigFromFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      // Parse and populate form fields
      const cfg = JSON.parse(e.target.result);
      fillForm(cfg);
      document.getElementById('config-error').textContent = '';
    } catch (err) {
      document.getElementById('config-error').textContent = `Invalid JSON file: ${err.message}`;
    }
    // Reset so the same file can be re-loaded
    input.value = '';
  };
  reader.readAsText(file);
}

function saveConfigToFile() {
  // Build config from current form state
  const config = buildConfigFromForm();
  const json = JSON.stringify(config, null, 2);

  // Trigger browser download
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'eval-config.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================================
// Utils
// ============================================================================
function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

init();
</script>
