<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>ThriveOS</title>
  <link rel="stylesheet" href="browser.css" />
</head>
<body>

  <!-- TOP BAR: nav + tabs + address + right buttons -->
  <div id="browser-bar">

    <!-- macOS traffic light spacer -->
    <div class="tl-spacer"></div>

    <!-- Back / Forward / Reload -->
    <div class="nav-btns">
      <button id="btn-back" class="nav-btn" title="Back" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="btn-forward" class="nav-btn" title="Forward" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button id="btn-reload" class="nav-btn" title="Reload">
        <svg id="icon-reload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <svg id="icon-stop" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Tab strip (pinned ThriveOS tabs + regular tabs) -->
    <div id="tabs-strip">
      <!-- Home pinned tab -->
      <button class="tab pin pin-home active" id="tab-home" data-pinned="home">
        <span class="tab-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </span>
        <span class="tab-label">Home</span>
      </button>

      <!-- Bizbox pinned tab -->
      <button class="tab pin pin-bizbox" id="tab-bizbox" data-pinned="bizbox">
        <span class="tab-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </span>
        <span class="tab-label">Bizbox</span>
      </button>

      <!-- Lifebud pinned tab -->
      <button class="tab pin pin-lifebud" id="tab-lifebud" data-pinned="lifebud">
        <span class="tab-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </span>
        <span class="tab-label">Lifebud</span>
      </button>

      <!-- Divider between pinned and regular tabs -->
      <div class="pin-sep" id="pin-sep"></div>

      <!-- Regular tabs injected here by browser.js -->
      <div id="regular-tabs"></div>
    </div>

    <!-- New tab button -->
    <button id="btn-new-tab" title="New Tab (⌘T)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- Address bar -->
    <div class="addr-wrap">
      <div class="addr-inner">
        <span class="lock-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input id="address-input" type="text" placeholder="Search or enter address" autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <!-- Right side buttons -->
    <div class="bar-right">
      <button id="btn-ai-panel" class="bar-btn" title="AI Assistant (ThriveOS Assistant)">
        <!-- Sparkle / AI icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
        </svg>
      </button>
      <button id="btn-menu" class="bar-btn" title="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>
  </div>

  <!-- Web content area (BrowserView renders here) -->
  <div id="webview-container">
    <!-- New tab page shown when no URL is open -->
    <div id="newtab-page" class="hidden">
      <div class="nt-logo">
        <img src="logo.svg" alt="ThriveOS" />
        <span class="nt-logo-name">ThriveOS</span>
      </div>
      <div class="nt-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="newtab-search-input" type="text" placeholder="Search the web…" />
      </div>
      <div class="nt-tiles">
        <button class="nt-tile" data-url="home">
          <div class="nt-tile-icon" style="background:#f5f0ff;">🏠</div>
          <span class="nt-tile-label">Home</span>
        </button>
        <button class="nt-tile" data-url="bizbox">
          <div class="nt-tile-icon" style="background:#f0f9ff;">💼</div>
          <span class="nt-tile-label">Bizbox</span>
        </button>
        <button class="nt-tile" data-url="lifebud">
          <div class="nt-tile-icon" style="background:#fff0f7;">💜</div>
          <span class="nt-tile-label">Lifebud</span>
        </button>
        <button class="nt-tile" data-url="https://google.com">
          <div class="nt-tile-icon" style="background:#f0fdf4;">🔍</div>
          <span class="nt-tile-label">Google</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="browser.js"></script>
</body>
</html>
