<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>ThriveOS</title>
  <link rel="stylesheet" href="browser.css" />
</head>
<body>
  <div id="toolbar">
    <!-- Nav buttons -->
    <div class="nav-buttons">
      <button id="btn-back" class="nav-btn" title="Back" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button id="btn-forward" class="nav-btn" title="Forward" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
      <button id="btn-reload" class="nav-btn" title="Reload">
        <svg id="icon-reload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <svg id="icon-stop" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Address bar -->
    <div class="address-bar-wrap">
      <div class="address-bar-inner">
        <span id="security-icon" class="security-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input
          id="address-input"
          type="text"
          class="address-input"
          placeholder="Search or enter address"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>

    <!-- Home button -->
    <div class="right-buttons">
      <button id="btn-home" class="home-btn" title="ThriveOS Home">
        <img src="logo.svg" alt="ThriveOS" class="logo-img" />
      </button>
    </div>
  </div>

  <script src="browser.js"></script>
</body>
</html>
