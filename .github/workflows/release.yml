name: Release ThriveOS Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build / ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            artifact_glob: 'electron/dist/**/*.dmg'
            artifact_name: ThriveOS-mac

          - platform: windows
            os: windows-latest
            artifact_glob: 'electron/dist/**/*.exe'
            artifact_name: ThriveOS-win

          - platform: linux
            os: ubuntu-latest
            artifact_glob: 'electron/dist/**/*.AppImage'
            artifact_name: ThriveOS-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Next.js dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build — ${{ matrix.platform }}
        working-directory: electron
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist output (debug)
        run: find electron/dist -type f 2>/dev/null || echo "electron/dist is empty or missing"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ThriveOS ${{ github.ref_name }}
          body: |
            ## ThriveOS Desktop ${{ github.ref_name }}

            Download the installer for your platform:

            | Platform | File |
            |----------|------|
            | macOS (Intel + Apple Silicon) | `ThriveOS.dmg` |
            | Windows | `ThriveOS_installer.exe` |
            | Linux | `ThriveOS.AppImage` |

            ### Installation
            - **macOS**: Open `.dmg` → drag ThriveOS to Applications
            - **Windows**: Run the `.exe` installer
            - **Linux**: `chmod +x ThriveOS.AppImage` then run it

            > First launch may show a security warning (builds are unsigned).
            > macOS: right-click → Open. Windows: "More info" → "Run anyway".
          files: |
            artifacts/ThriveOS-mac/*.dmg
            artifacts/ThriveOS-win/*.exe
            artifacts/ThriveOS-linux/*.AppImage
          generate_release_notes: false
          fail_on_unmatched_files: false
