<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>ThriveOS</title>
  <link rel="stylesheet" href="browser.css" />
</head>
<body>

  <!-- ═══ ROW 1: ThriveOS Section Tabs ═══ -->
  <div id="section-bar">
    <div class="section-bar-left">
      <div class="traffic-light-spacer"></div>

      <button class="section-tab home-tab active" id="tab-home" data-section="home">
        <span class="home-glow-ring"></span>
        <img src="logo.svg" alt="" class="home-logo" />
        <span class="home-label">My Home</span>
      </button>

      <div class="section-divider"></div>

      <button class="section-tab bizbox-tab" id="tab-bizbox" data-section="bizbox">
        <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        <span>Bizbox</span>
      </button>

      <button class="section-tab lifebud-tab" id="tab-lifebud" data-section="lifebud">
        <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402C1 3.343 4.343 1 7.5 1c1.88 0 3.71.885 4.5 2.414C12.79 1.885 14.62 1 16.5 1 19.657 1 23 3.343 23 7.191c0 4.105-5.37 8.863-11 14.402z"/>
        </svg>
        <span>Lifebud</span>
      </button>
    </div>

    <div class="section-bar-right">
      <!-- Focus Mode -->
      <button id="btn-focus" class="icon-btn focus-btn" title="Focus Mode (⌘⇧F)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M3 9V5a2 2 0 0 1 2-2h4M15 3h4a2 2 0 0 1 2 2v4M21 15v4a2 2 0 0 1-2 2h-4M9 21H5a2 2 0 0 1-2-2v-4"/>
        </svg>
      </button>

      <!-- Quick Clip -->
      <button id="btn-clip" class="icon-btn clip-btn" title="Clip to ThriveOS (⌘⇧S)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </button>

      <!-- Command Palette trigger -->
      <button id="btn-command" class="command-trigger" title="Command Palette (⌘K)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <span class="command-hint">⌘K</span>
      </button>

      <!-- AI Sidebar toggle -->
      <button id="btn-ai" class="ai-sidebar-toggle" title="AI Assistant (⌘\)">
        <span class="ai-dot"></span>
        <span class="ai-label">AI</span>
      </button>
    </div>
  </div>

  <!-- ═══ ROW 2: Browser Tabs + Nav + Address Bar ═══ -->
  <div id="browser-bar">
    <div class="nav-buttons">
      <button id="btn-back" class="nav-btn" title="Back" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="btn-forward" class="nav-btn" title="Forward" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button id="btn-reload" class="nav-btn" title="Reload">
        <svg id="icon-reload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <svg id="icon-stop" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div id="tabs-strip"></div>

    <button id="btn-new-tab" class="new-tab-btn" title="New Tab (⌘T)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <div class="address-bar-wrap">
      <div class="address-bar-inner">
        <span id="security-icon" class="security-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input id="address-input" type="text" class="address-input"
          placeholder="Search or enter address"
          autocomplete="off" spellcheck="false" />
      </div>
    </div>
  </div>

  <!-- ═══ COMMAND PALETTE ═══ -->
  <div id="command-palette" class="hidden">
    <div class="palette-backdrop" id="palette-backdrop"></div>
    <div class="palette-modal">
      <div class="palette-search-row">
        <svg class="palette-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="palette-input" type="text" class="palette-input" placeholder="Search commands, go to Bizbox, Lifebud…" autocomplete="off" spellcheck="false" />
        <kbd class="palette-esc-key">esc</kbd>
      </div>
      <div class="palette-results" id="palette-results"></div>
      <div class="palette-footer">
        <span><kbd>↑↓</kbd> navigate</span>
        <span><kbd>↵</kbd> select</span>
        <span><kbd>esc</kbd> close</span>
      </div>
    </div>
  </div>

  <!-- ═══ QUICK CLIP PANEL ═══ -->
  <div id="clip-panel" class="hidden">
    <div class="clip-backdrop" id="clip-backdrop"></div>
    <div class="clip-modal">
      <div class="clip-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;color:#a78bfa;flex-shrink:0">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Clip to ThriveOS</span>
        <button class="clip-close-btn" id="clip-close">×</button>
      </div>
      <div class="clip-url-display" id="clip-url-display"></div>
      <textarea id="clip-note" class="clip-note" placeholder="Add a note (optional)…" rows="2"></textarea>
      <div class="clip-actions">
        <button class="clip-action bizbox-action" id="clip-to-bizbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
          </svg>
          Save to Bizbox
        </button>
        <button class="clip-action lifebud-action" id="clip-to-lifebud">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0">
            <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402C1 3.343 4.343 1 7.5 1c1.88 0 3.71.885 4.5 2.414C12.79 1.885 14.62 1 16.5 1 19.657 1 23 3.343 23 7.191c0 4.105-5.37 8.863-11 14.402z"/>
          </svg>
          Save to Lifebud
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ AI SIDEBAR ═══ -->
  <div id="ai-sidebar" class="hidden">
    <div class="ai-sidebar-inner">
      <div class="ai-sidebar-header">
        <div class="ai-sidebar-title">
          <span class="ai-dot"></span>
          ThriveOS AI
        </div>
        <button id="ai-sidebar-close" class="icon-btn" style="color:var(--text-muted)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="ai-quick-actions">
        <button class="ai-quick-btn" id="ai-summarize">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;flex-shrink:0">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Summarize page
        </button>
        <button class="ai-quick-btn bizbox-quick" id="ai-to-bizbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;flex-shrink:0">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
          </svg>
          Add to Bizbox
        </button>
        <button class="ai-quick-btn lifebud-quick" id="ai-to-lifebud">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;flex-shrink:0">
            <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402C1 3.343 4.343 1 7.5 1c1.88 0 3.71.885 4.5 2.414C12.79 1.885 14.62 1 16.5 1 19.657 1 23 3.343 23 7.191c0 4.105-5.37 8.863-11 14.402z"/>
          </svg>
          Log to Lifebud
        </button>
      </div>

      <div class="ai-messages" id="ai-messages">
        <div class="ai-msg ai-msg-bot">
          <div class="ai-avatar">AI</div>
          <div class="ai-bubble">
            I'm your ThriveOS OS — I connect your browsing to your businesses and life goals. Summarize pages, save to Bizbox, or log progress to Lifebud. What do you need?
          </div>
        </div>
      </div>

      <div class="ai-input-row">
        <input type="text" id="ai-input" class="ai-input" placeholder="Ask anything…" autocomplete="off" spellcheck="false" />
        <button id="ai-send" class="ai-send-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ FOCUS MODE BANNER ═══ -->
  <div id="focus-banner" class="hidden">
    <div class="focus-indicator">
      <span class="focus-dot-anim"></span>
      Focus Mode
    </div>
    <button id="focus-exit">Exit Focus</button>
  </div>

  <!-- ═══ TOAST ═══ -->
  <div id="toast" class="toast hidden"></div>

  <script src="browser.js"></script>
</body>
</html>
